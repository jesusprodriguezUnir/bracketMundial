  <rect width="680" height="680" fill="#1a1933"/>
  <circle cx="348" cy="346" r="278" fill="#b84d0e"/>
  <circle cx="340" cy="338" r="278" fill="#e8904a"/>
  <circle cx="340" cy="338" r="260" fill="none" stroke="#1a1933" stroke-width="6"/>
